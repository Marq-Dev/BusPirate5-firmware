name: Deep Format Diagnostic

on:
  pull_request:
    branches: [ "main" ]

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'feature/deep-format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/deep-format

      - name: Run implementation stages with captured output
        id: diagnose
        continue-on-error: true
        run: |
          mkdir -p diagnostic
          set +e

          python3 - <<'PY' > diagnostic/runtime-patch.log 2>&1
          from pathlib import Path
          path = Path('tools/apply_deep_format.py')
          text = path.read_text()
          replacements = {
              'updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)':
                  'updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.DOTALL)',
              'if "host-tests:" not in workflow:':
                  'if False and "host-tests:" not in workflow:',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'automation patch anchor missing: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          runtime_status=$?

          python3 -m py_compile tools/apply_deep_format.py \
            > diagnostic/py-compile.log 2>&1
          compile_status=$?

          python3 tools/apply_deep_format.py \
            > diagnostic/apply.log 2>&1
          apply_status=$?

          (cd src/translation && python3 json2h.py) \
            > diagnostic/translation.log 2>&1
          translation_status=$?

          git diff --check > diagnostic/diff-check.log 2>&1
          diff_status=$?

          {
            echo "runtime_patch=$runtime_status"
            echo "py_compile=$compile_status"
            echo "apply=$apply_status"
            echo "translation=$translation_status"
            echo "diff_check=$diff_status"
          } | tee diagnostic/status.txt

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-diagnostic
          path: diagnostic
          if-no-files-found: error
