name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  BUILD_TARGET: all

jobs:
  deep-format-implementation:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/deep-format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/deep-format
          fetch-depth: 0

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib

      - name: Apply implementation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_deep_format.py')
          text = path.read_text()
          old = 'updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)'
          new = 'updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.DOTALL)'
          if old not in text:
              raise SystemExit('literal-regex replacement anchor missing')
          path.write_text(text.replace(old, new, 1))
          PY
          python3 -m py_compile tools/apply_deep_format.py
          python3 tools/apply_deep_format.py
          (cd src/translation && python3 json2h.py)
          chmod +x tests/host/run_host_tests.sh
          git diff --check

      - name: Run host and source-contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

      - name: Configure and build RP2350 firmware
        run: |
          cmake -S . -B build/rp2350-final \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2350 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2350-final --target all --parallel 2

      - name: Configure and build RP2040 firmware
        run: |
          cmake -S . -B build/rp2040-final \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2040 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2040-final --target all --parallel 2

      - name: Upload verified firmware
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-verified-firmware
          path: |
            build/rp2350-final/src/*.uf2
            build/rp2350-final/src/*.elf
            build/rp2350-final/src/*.bin
            build/rp2040-final/src/*.uf2
            build/rp2040-final/src/*.elf
            build/rp2040-final/src/*.bin
          if-no-files-found: error

      - name: Commit verified implementation
        run: |
          cat > .github/workflows/build.yaml <<'YAML'
          name: CMake

          on:
            push:
              branches: [ "main" ]
            pull_request:
              branches: [ "main" ]
            workflow_dispatch:

          env:
            BUILD_TYPE: Release
            BUILD_TARGET: all

          jobs:
            host-tests:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Run host and contract tests
                  run: |
                    python3 -m unittest tests/test_deep_format_contract.py -v
                    bash tests/host/run_host_tests.sh

            build:
              needs: host-tests
              runs-on: ${{ matrix.os }}
              strategy:
                fail-fast: false
                matrix:
                  os: [ ubuntu-latest, macos-latest ]
                  board: [ rp2040, rp2350 ]

              steps:
                - uses: actions/checkout@v4

                - name: Linux setup
                  if: ${{ matrix.os == 'ubuntu-latest' }}
                  run: |
                    sudo apt update && sudo apt install gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
                    echo "PICO_SDK_FETCH_FROM_GIT=TRUE" >> "$GITHUB_ENV"

                - name: MacOS setup
                  if: ${{ matrix.os == 'macos-latest' }}
                  run: |
                    brew update && brew install --cask gcc-arm-embedded
                    echo "PICO_SDK_FETCH_FROM_GIT=TRUE" >> "$GITHUB_ENV"

                - name: Configure CMake
                  run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBP_PICO_PLATFORM=${{ matrix.board }}

                - name: Build
                  if: ${{ matrix.os == 'macos-latest' }}
                  run: cmake --build ${{ github.workspace }}/build --target ${{ env.BUILD_TARGET }}

                - name: Build
                  if: ${{ matrix.os != 'macos-latest' }}
                  run: cmake --build ${{ github.workspace }}/build --parallel --target ${{ env.BUILD_TARGET }}

                - name: Save Artifacts
                  uses: actions/upload-artifact@v4
                  with:
                    name: firmware-${{ matrix.board }}-${{ matrix.os }}
                    path: |
                      ${{ github.workspace }}/build/src/bus_pirate*.bin
                      ${{ github.workspace }}/build/src/bus_pirate*.dis
                      ${{ github.workspace }}/build/src/bus_pirate*.elf
                      ${{ github.workspace }}/build/src/bus_pirate*.elf.map
                      ${{ github.workspace }}/build/src/bus_pirate*.uf2
                    retention-days: 7
                    if-no-files-found: error
          YAML

          rm -f tools/apply_deep_format.py
          rm -rf build-host build/rp2350-final build/rp2040-final
          git diff --check
          git config user.name 'Marq-Dev'
          git config user.email '9102154+Marq-Dev@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add NAND deep-format storage recovery'
          git push origin HEAD:feature/deep-format

  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref != 'feature/deep-format'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        board: [ rp2040, rp2350 ]

    steps:
      - uses: actions/checkout@v4

      - name: Linux setup
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt update && sudo apt install gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
          echo "PICO_SDK_FETCH_FROM_GIT=TRUE" >> "$GITHUB_ENV"

      - name: MacOS setup
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew update && brew install --cask gcc-arm-embedded
          echo "PICO_SDK_FETCH_FROM_GIT=TRUE" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DBP_PICO_PLATFORM=${{ matrix.board }}

      - name: Build
        if: ${{ matrix.os == 'macos-latest' }}
        run: cmake --build ${{ github.workspace }}/build --target ${{ env.BUILD_TARGET }}

      - name: Build
        if: ${{ matrix.os != 'macos-latest' }}
        run: cmake --build ${{ github.workspace }}/build --parallel --target ${{ env.BUILD_TARGET }}

      - name: Save Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}-${{ matrix.os }}
          path: |
            ${{ github.workspace }}/build/src/bus_pirate*.bin
            ${{ github.workspace }}/build/src/bus_pirate*.dis
            ${{ github.workspace }}/build/src/bus_pirate*.elf
            ${{ github.workspace }}/build/src/bus_pirate*.elf.map
            ${{ github.workspace }}/build/src/bus_pirate*.uf2
          retention-days: 7
          if-no-files-found: error
