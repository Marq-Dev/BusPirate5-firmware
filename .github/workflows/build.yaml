name: CMake

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  finalize-verified-source:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/deep-format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/deep-format
          fetch-depth: 0

      - name: Apply verified implementation
        run: python3 tools/run_deep_format_gate.py

      - name: Re-run host and source-contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

      - name: Finalize and push verified source
        id: finalize
        continue-on-error: true
        run: |
          set -o pipefail
          {
            python3 tools/finalize_deep_format.py
            git config user.name 'Marq-Dev'
            git config user.email '9102154+Marq-Dev@users.noreply.github.com'
            git add -A
            if git diff --cached --name-only | grep -q '^.github/workflows/'; then
              echo 'Refusing to push workflow changes with the Actions token.'
              git diff --cached --name-only
              exit 1
            fi
            git status --short
            git commit -m 'feat: add NAND deep-format storage recovery'
            git push origin HEAD:feature/deep-format
          } > /tmp/deep-format-finalize.log 2>&1

      - name: Upload finalization log
        if: steps.finalize.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-finalize-log
          path: /tmp/deep-format-finalize.log
          if-no-files-found: error

      - name: Stop after finalization failure
        if: steps.finalize.outcome == 'failure'
        run: |
          cat /tmp/deep-format-finalize.log
          exit 1
