name: CMake

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  BUILD_TARGET: all

jobs:
  deep-format-implementation:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/deep-format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/deep-format
          fetch-depth: 0

      - name: Apply implementation without normalizing line endings
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('tools/apply_deep_format.py')
          text = path.read_text()

          replacements = {
              'updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)':
                  'updated, count = re.subn(pattern, lambda _match: replacement, text, count=1, flags=re.DOTALL)',
              'if "host-tests:" not in workflow:':
                  'if False and "host-tests:" not in workflow:',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'automation patch anchor missing: {old}')
              text = text.replace(old, new, 1)

          old_write = '''def write(path: str, content: str) -> None:
    (ROOT / path).write_text(content, encoding="utf-8", newline="\\n")
'''
          new_write = '''def write(path: str, content: str) -> None:
    target = ROOT / path
    raw = target.read_bytes()
    newline = b"\\r\\n" if b"\\r\\n" in raw else b"\\n"
    normalized = content.replace("\\r\\n", "\\n").replace("\\r", "\\n")
    encoded = normalized.encode("utf-8")
    if newline == b"\\r\\n":
        encoded = encoded.replace(b"\\n", b"\\r\\n")
    target.write_bytes(encoded)
'''
          if old_write not in text:
              raise SystemExit('newline-preserving writer anchor missing')
          text = text.replace(old_write, new_write, 1)
          path.write_text(text)
          PY

          python3 -m py_compile tools/apply_deep_format.py
          python3 tools/apply_deep_format.py
          (cd src/translation && python3 json2h.py)
          chmod +x tests/host/run_host_tests.sh
          git diff --check

      - name: Run host and source-contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib

      - name: Configure and build RP2350 firmware
        run: |
          cmake -S . -B build/rp2350-final \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2350 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2350-final --target all --parallel 2

      - name: Configure and build RP2040 firmware
        run: |
          cmake -S . -B build/rp2040-final \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2040 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2040-final --target all --parallel 2

      - name: Upload verified firmware
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-verified-firmware
          path: |
            build/rp2350-final/src/*.uf2
            build/rp2350-final/src/*.elf
            build/rp2350-final/src/*.bin
            build/rp2040-final/src/*.uf2
            build/rp2040-final/src/*.elf
            build/rp2040-final/src/*.bin
          if-no-files-found: error

      - name: Commit verified implementation
        run: |
          git show origin/main:.github/workflows/build.yaml > .github/workflows/build.yaml
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/build.yaml')
          text = path.read_text()
          anchor = 'jobs:\n  build:\n'
          replacement = '''jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run host and contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

  build:
    needs: host-tests
'''
          if text.count(anchor) != 1:
              raise SystemExit(f'expected one final-workflow anchor, found {text.count(anchor)}')
          path.write_text(text.replace(anchor, replacement, 1))
          PY

          rm -f tools/apply_deep_format.py
          rm -f .github/workflows/deep-format-diagnostic.yml
          rm -rf build-host build/rp2350-final build/rp2040-final
          git diff --check
          git config user.name 'Marq-Dev'
          git config user.email '9102154+Marq-Dev@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add NAND deep-format storage recovery'
          git push origin HEAD:feature/deep-format
