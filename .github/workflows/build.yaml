name: Deep Format FatFs Fix Gate

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  fix-and-verify:
    if: github.event.pull_request.head.ref == 'fix/deep-format-fatfs-work-area' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deep-format-fatfs-work-area
          fetch-depth: 0

      - name: Register FatFs work area before volume labeling
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/pirate/storage.c')
          raw = path.read_bytes()
          old = (
              b'    if (fr == FR_OK) {\r\n'
              b'        #if BP_VER == 5\r\n'
          )
          new = (
              b'    if (fr == FR_OK) {\r\n'
              b'        fr = f_mount(&fs, "", 0);\r\n'
              b'        if (fr != FR_OK) {\r\n'
              b'            return fr;\r\n'
              b'        }\r\n'
              b'\r\n'
              b'        #if BP_VER == 5\r\n'
          )
          if raw.count(old) != 1:
              raise SystemExit(f'expected one storage_format anchor, found {raw.count(old)}')
          path.write_bytes(raw.replace(old, new, 1))
          PY
          git -c core.whitespace=cr-at-eol diff --check -- src/pirate/storage.c

      - name: Run host and source-contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib

      - name: Build RP2350 firmware
        run: |
          cmake -S . -B build/rp2350-fix \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2350 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2350-fix --parallel 2 --target all

      - name: Build RP2040 firmware
        run: |
          cmake -S . -B build/rp2040-fix \
            -DCMAKE_BUILD_TYPE=Release \
            -DBP_PICO_PLATFORM=rp2040 \
            -DPICO_SDK_FETCH_FROM_GIT=TRUE \
            -DPICO_SDK_FETCH_FROM_GIT_TAG:STRING=2.3.0
          cmake --build build/rp2040-fix --parallel 2 --target all

      - name: Upload verified firmware
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-fatfs-fix-firmware
          path: |
            build/rp2350-fix/src/*.uf2
            build/rp2040-fix/src/*.uf2
          if-no-files-found: error

      - name: Commit verified source fix
        run: |
          rm -rf build/rp2350-fix build/rp2040-fix build-host
          git config user.name 'Marq-Dev'
          git config user.email '9102154+Marq-Dev@users.noreply.github.com'
          git add src/pirate/storage.c
          git commit -m 'fix: register FatFs work area before labeling formatted storage'
          git push origin HEAD:fix/deep-format-fatfs-work-area
