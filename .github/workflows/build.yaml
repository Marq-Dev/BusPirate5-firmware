name: CMake

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  package-verified-source:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/deep-format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/deep-format
          fetch-depth: 0

      - name: Apply verified implementation
        id: apply
        continue-on-error: true
        run: python3 tools/run_deep_format_gate.py > /tmp/deep-format-apply.log 2>&1

      - name: Upload apply failure
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-source-apply-log
          path: /tmp/deep-format-apply.log
          if-no-files-found: error

      - name: Stop after apply failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat /tmp/deep-format-apply.log
          exit 1

      - name: Run host and source-contract tests
        run: |
          python3 -m unittest tests/test_deep_format_contract.py -v
          bash tests/host/run_host_tests.sh

      - name: Package final source files
        run: |
          mkdir -p verified-source
          while IFS= read -r path; do
            mkdir -p "verified-source/$(dirname "$path")"
            cp "$path" "verified-source/$path"
          done <<'FILES'
          src/CMakeLists.txt
          src/commands/global/disk.c
          src/commands/global/disk_format_flow.c
          src/commands/global/disk_format_flow.h
          src/commands/infrared/tvbgone.c
          src/lib/bp_args/bp_cmd.c
          src/lib/bp_args/bp_cmd.h
          src/nand/nand_ftl_diskio.c
          src/nand/nand_ftl_diskio.h
          tests/host/run_host_tests.sh
          tests/host/test_disk_format_flow.c
          tests/host/test_tvbgone_macro_scope.c
          tests/test_deep_format_contract.py
          docs/commands/format-deep.md
          FILES
          git -c core.whitespace=cr-at-eol diff --check
          find verified-source -type f -print | sort

      - name: Upload verified source
        uses: actions/upload-artifact@v4
        with:
          name: deep-format-verified-source
          path: verified-source
          if-no-files-found: error
